<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Facebook cover — Ahmad Touqeer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1702px; height: 630px; overflow: hidden; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #ffffff; color: #171717; position: relative;
  }
  /* soft fluid-style glows, same palette as the portfolio */
  .glow { position: absolute; border-radius: 50%; filter: blur(120px); opacity: .30; }
  .g1 { width: 560px; height: 560px; background: #34d399; top: -220px; right: 120px; }
  .g2 { width: 480px; height: 480px; background: #a855f7; bottom: -240px; left: -100px; }
  .g3 { width: 420px; height: 420px; background: #22d3ee; bottom: -200px; right: -80px; }
  .g4 { width: 300px; height: 300px; background: #ec4899; top: -140px; left: 34%; }

  .wrap {
    position: relative; height: 100%;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 130px;
  }
  .mono { font-family: ui-monospace, 'Cascadia Mono', Consolas, monospace; letter-spacing: .22em; text-transform: uppercase; }

  .role { font-size: 26px; color: #525252; }
  h1 { font-size: 108px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; margin: 10px 0 26px; }
  h1 .light { font-weight: 300; font-style: italic; }

  .chips { display: flex; gap: 18px; }
  .chip {
    background: rgba(255,255,255,.55); border: 1.5px solid rgba(255,255,255,.9);
    box-shadow: 0 4px 24px rgba(0,0,0,.07);
    border-radius: 999px; padding: 16px 30px;
    font-size: 25px; font-weight: 600; color: #262626;
    backdrop-filter: blur(8px);
  }
  .chip b { font-weight: 800; }

  .link {
    position: absolute; right: 130px; bottom: 44px;
    font-size: 22px; color: #737373;
  }
</style>
</head>
<body>
  <div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div><div class="glow g4"></div>

  <div class="wrap">
    <div class="role mono">Shopify Developer &middot; Paris</div>
    <h1>Ahmad <span class="light">Touqeer</span></h1>
    <div class="chips">
      <div class="chip"><b>100+</b> stores built</div>
      <div class="chip"><b>50+</b> themes &middot; <b>1,000+</b> copies sold</div>
      <div class="chip"><b>AI</b> agents &amp; automation</div>
    </div>
  </div>

  <div class="link mono">ahmadtouqeer1995-droid.github.io/portfolio</div>
</body>
</html>
